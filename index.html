<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK SMART GLASSES</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: sans-serif; margin: 0; padding: 20px; }
        .language-selector { position: absolute; top: 20px; right: 20px; }
        select { background: #111; color: #00ffcc; border: 1px solid #333; padding: 5px; cursor: pointer; }
        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 60px; }
        .item { border: 1px solid #333; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="language-selector">
    <select id="langSelect" onchange="changeLanguage()">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="uk">Українська</option>
        <option value="ja">日本語</option>
        <option value="ru">Русский</option>
        <option value="vi">Tiếng Việt</option>
        <option value="th">ภาษาไทย</option>
        <option value="id">Bahasa Indonesia</option>
    </select>
</div>

<div class="grid-3x3" id="grid">
    <div class="item" data-ko="뉴럴 인증" data-en="Neural Auth">뉴럴 인증</div>
    <div class="item" data-ko="감성 분석" data-en="Sentiment Analysis">감성 분석</div>
    <div class="item" data-ko="통합 모니터링" data-en="Monitoring">통합 모니터링</div>
    <div class="item" data-ko="환경 동기화" data-en="Sync">환경 동기화</div>
    <div class="item" data-ko="언어 번역" data-en="Translation">언어 번역</div>
    <div class="item" data-ko="에너지 관리" data-en="Energy Mgmt">에너지 관리</div>
    <div class="item" data-ko="투명 결제" data-en="Payment">투명 결제</div>
    <div class="item" data-ko="경영 신호" data-en="Management">경영 신호</div>
    <div class="item" data-ko="데이터 수집" data-en="Data">데이터 수집</div>
</div>

<script>
    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const items = document.querySelectorAll('.item');
        items.forEach(item => {
            if (item.getAttribute('data-' + lang)) {
                item.innerText = item.getAttribute('data-' + lang);
            }
        });
    }
</script>

</body>
</html
