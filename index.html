<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HK Smart Vision - Global Platform</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; }
        
        /* 14개국어 드롭다운 */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background-color: #444; color: white; padding: 12px 24px; border: none; cursor: pointer; font-weight: bold; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #222; min-width: 200px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); z-index: 100; max-height: 400px; overflow-y: auto; }
        .dropdown-content a { color: white; padding: 12px; display: block; text-decoration: none; border-bottom: 1px solid #333; }
        .dropdown:hover .dropdown-content { display: block; }

        /* 5x2 그리드 설명 박스 */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 30px; }
        .box { background: #2a2a2a; padding: 20px; border: 1px solid #444; border-radius: 8px; transition: 0.3s; }
        .box h3 { margin: 0 0 10px 0; color: #ffd700; font-size: 16px; }
        .box p { font-size: 13px; color: #ccc; line-height: 1.5; margin: 0; }
    </style>
</head>
<body>

<div class="header">
    <h1>HK Smart Vision</h1>
    <div class="dropdown">
        <button class="dropbtn">Global Languages (14) ▼</button>
        <div class="dropdown-content" id="langList">
            <!-- 14개국어 자동 삽입 -->
        </div>
    </div>
</div>

<div class="grid-container" id="featureGrid">
    <!-- 10개 핵심 기능 박스 (5x2) -->
</div>

<script>
    const HK_DATA = {
        "Korean": [
            ["Neural Auth", "뇌파 및 생체 신호를 활용한 가장 안전한 본인 인증입니다."],
            ["Sync", "모든 기기와의 끊김 없는 실시간 데이터 동기화."],
            ["Payment", "시선과 제스처만으로 이루어지는 차세대 결제."],
            ["Sentiment", "대화 상대의 감정을 실시간으로 파악하여 소통 지원."],
            ["Translation", "언어 장벽 없는 전 세계 실시간 통역."],
            ["Management", "글라스 상태 및 연결 기기 통합 관리."],
            ["Monitoring", "기기 가동 및 보안 시스템 실시간 추적."],
            ["Energy Mgmt", "스마트 배터리 최적화를 통한 에너지 효율화."],
            ["Vision AI", "고도화된 공간 인식 및 지능형 환경 정보 처리."],
            ["HK Cloud", "개인 데이터를 안전하게 보관하는 전용 클라우드."]
        ],
        // ... (이하 나머지 13개국어 동일 데이터 구조)
    };
    
    // 언어 리스트 및 그리드 생성 로직 (14개국어 반영)
    const langs = ["Korean", "English", "Chinese", "Arabic", "Hindi", "Spanish", "Portuguese", "Ukrainian", "Japanese", "Russian", "Vietnamese", "Thai", "Indonesian", "Palestinian"];
    const langList = document.getElementById('langList');
    
    langs.forEach(lang => {
        langList.innerHTML += `<a href="#" onclick="updateGrid('${lang}')">${lang}</a>`;
    });

    function updateGrid(lang) {
        const grid = document.getElementById('featureGrid');
        grid.innerHTML = '';
        HK_DATA[lang].forEach(item => {
            grid.innerHTML += `
                <div class="box">
                    <h3>${item[0]}</h3>
                    <p>${item[1]}</p>
                </div>
            `;
        });
    }

    updateGrid('Korean');
</script>
</body>
</html>
