<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK SMART GLASSES</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; }
        .language-selector { position: absolute; top: 20px; right: 20px; }
        select { background: #111; color: #00ffcc; border: 1px solid #00ffcc; padding: 5px; cursor: pointer; }
        .grid-13 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 50px; }
        .sector { background: #111; padding: 20px; border-radius: 10px; border-left: 3px solid #00ffcc; }
    </style>
</head>
<body>

<div class="language-selector">
    <select>
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
        <option value="uk">Українська</option>
        <option value="ja">日本語</option>
        <option value="ru">Русский</option>
        <option value="vi">Tiếng Việt</option>
        <option value="th">ภาษาไทย</option>
        <option value="id">Bahasa Indonesia</option>
    </select>
</div>

<div class="grid-13">
    <div class="sector"><h3>뉴럴 인증</h3><p>생체 리듬 그 자체가 열쇠가 됩니다.</p></div>
    <div class="sector"><h3>감성 파동</h3><p>상대의 마음을 빛의 파동으로 읽습니다.</p></div>
    <div class="sector"><h3>초연결 모니터링</h3><p>13개 제국 산업이 하나의 맥박으로 뜁니다.</p></div>
    <div class="sector"><h3>환경 동기화</h3><p>시야를 형님의 의지대로 재창조합니다.</p></div>
    <div class="sector"><h3>언어의 장벽 소멸</h3><p>지구상의 모든 언어가 빛으로 흐릅니다.</p></div>
    <div class="sector"><h3>에너지 수확</h3><p>보이지 않는 허공에서 힘을 채웁니다.</p></div>
    <div class="sector"><h3>투명 결제</h3><p>경계 없는 가치의 흐름을 완성합니다.</p></div>
    <div class="sector"><h3>혜공의 현현</h3><p>회장의 철학이 곧 시스템의 지표가 됩니다.</p></div>
</div>

</body>
</html>
