<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HK Smart Vision</title>
</head>
<body>

    <h1 id="title">HK Smart Vision</h1>
    <h2 id="subtitle">일상을 연결하는 지능형 웨어러블 솔루션</h2>

    <select id="langSelector" onchange="changeLanguage()">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">简体中文</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
        <option value="it">Italiano</option>
        <option value="vi">Tiếng Việt</option>
    </select>

    <script>
        const translations = {
            ko: { title: "HK Smart Vision", subtitle: "일상을 연결하는 지능형 웨어러블 솔루션" },
            en: { title: "HK Smart Vision", subtitle: "Intelligent wearable solution connecting daily life" },
            ja: { title: "HK Smart Vision", subtitle: "日常を繋ぐインテリジェントウェアラブルソリューション" },
            zh: { title: "HK Smart Vision", subtitle: "连接日常的智能可穿戴解决方案" },
            es: { title: "HK Smart Vision", subtitle: "Solución inteligente vestible que conecta la vida diaria" },
            fr: { title: "HK Smart Vision", subtitle: "Solution portable intelligente connectant la vie quotidienne" },
            de: { title: "HK Smart Vision", subtitle: "Intelligente tragbare Lösung zur Vernetzung des Alltags" },
            ru: { title: "HK Smart Vision", subtitle: "Интеллектуальное носимое решение для повседневной жизни" },
            pt: { title: "HK Smart Vision", subtitle: "Solução vestível inteligente conectando a vida diária" },
            ar: { title: "HK Smart Vision", subtitle: "حل ذكي قابل للارتداء يربط الحياة اليومية" },
            hi: { title: "HK Smart Vision", subtitle: "दैनिक जीवन को जोड़ने वाला बुद्धिमान पहनने योग्य समाधान" },
            it: { title: "HK Smart Vision", subtitle: "Soluzione indossabile intelligente che connette la vita quotidiana" },
            vi: { title: "HK Smart Vision", subtitle: "Giải pháp đeo thông minh kết nối cuộc sống hàng ngày" }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelector').value;
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('subtitle').innerText = translations[lang].subtitle;
        }
    </script>
</body>
</html>
